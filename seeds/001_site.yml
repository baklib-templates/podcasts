    # Create tags: POST /api/v1/sites/:site_id/tags (see https://dev.baklib.cn/api).
    # Liquid: `site.tags`; page-side tags use template schema `tag_picker` → `page.settings.tags`
    # (see https://dev.baklib.cn/guide/objects).

    # Custom HTML (see settings_schema.json)
