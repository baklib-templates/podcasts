site:
  language: 'en'
  settings:
    # General settings (see settings_schema.json).
    is_allow_header: false
    is_allow_footer: false
    is_allow_feedback: false
    is_show_visit_count: false

    # Podcast settings
    podcast_title: "Their Side"
    podcast_tagline: "Conversations with the most tragically misunderstood people of our time."
    podcast_hosts: "Eric Gordon / Wes Mantooth"
    podcast_about: |
      In this show, Eric and Wes dig deep to get to the facts with guests who have been labeled villains by a society quick to judge, without actually getting the full story. Tune in every Thursday to get to the truth with another misunderstood outcast as they share the missing context in their tragic tale.
    poster_image_url: "images/poster.png"

    header_html: |
      <a href="#" class="group flex items-center" aria-label="Spotify">
        <span class="h-8 w-8 rounded-full bg-slate-200 group-hover:bg-slate-300"></span>
        <span class="hidden sm:ml-3 sm:block">Spotify</span>
      </a>
      <a href="#" class="group flex items-center" aria-label="Apple Podcast">
        <span class="h-8 w-8 rounded-full bg-slate-200 group-hover:bg-slate-300"></span>
        <span class="hidden sm:ml-3 sm:block">Apple Podcast</span>
      </a>
      <a href="#" class="group flex items-center" aria-label="Overcast">
        <span class="h-8 w-8 rounded-full bg-slate-200 group-hover:bg-slate-300"></span>
        <span class="hidden sm:ml-3 sm:block">Overcast</span>
      </a>
      <a href="#" class="group flex items-center" aria-label="RSS Feed">
        <span class="h-8 w-8 rounded-full bg-slate-200 group-hover:bg-slate-300"></span>
