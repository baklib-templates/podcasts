      <a href="/s/about" class="hover:underline">About</a>
    footer_menu_html: |
      <a href="/" class="text-white hover:underline">Back to site</a>
      <a href="/#privacy" class="text-white hover:underline">Privacy</a>
      <a href="/#terms" class="text-white hover:underline">Terms</a>
